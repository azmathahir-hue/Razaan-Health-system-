<!DOCTYPE html>
<html lang="so">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Razaan Healthcare System</title>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#03254c;
    --navy-deep:#021833;
    --primary:#0284c7;
    --sky:#0ea5e9;
    --mint:#10b981;
    --ink:#0f172a;
    --slate:#5b6b83;
    --paper:#f7fafd;
    --line:#e1e8f2;
    --card:#ffffff;
    --radius:20px;
    --radius-sm:12px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{font-family:'Inter',sans-serif;color:var(--slate);background:#fff;line-height:1.6;}
  h1,h2,h3,h4{font-family:'Sora',sans-serif;color:var(--ink);}
  a{text-decoration:none;}
  ul{list-style:none;}
  img{max-width:100%;display:block;}
  section{position:relative;}
  .eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    font-size:12.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
    color:var(--primary);margin-bottom:14px;
  }
  .eyebrow::before{content:"";width:22px;height:2px;background:var(--sky);border-radius:2px;}
  .container{max-width:1220px;margin:0 auto;padding:0 32px;}
  .center-head{text-align:center;max-width:640px;margin:0 auto 56px;}
  .center-head h2{font-size:38px;font-weight:800;line-height:1.15;}
  .center-head p{margin-top:14px;font-size:16.5px;}

  /* ===== NAVBAR ===== */
  .navwrap{
    position:sticky;top:0;z-index:500;
    background:rgba(255,255,255,.85);backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line);
  }
  .navbar{
    max-width:1280px;margin:0 auto;padding:16px 32px;
    display:flex;align-items:center;justify-content:space-between;gap:24px;
  }
  .logo{display:flex;align-items:center;gap:12px;font-family:'Sora',sans-serif;}
  .logo-mark{
    width:42px;height:42px;border-radius:12px;
    background:linear-gradient(135deg,var(--primary),var(--navy));
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:800;flex:none;
  }
  .logo-text b{display:block;font-size:16.5px;font-weight:800;color:var(--ink);letter-spacing:.3px;}
  .logo-text span{display:block;font-size:10.5px;letter-spacing:2px;color:var(--slate);font-weight:600;}
  .nav-links{display:flex;gap:30px;}
  .nav-links a{color:var(--ink);font-weight:600;font-size:14.5px;position:relative;padding:6px 0;}
  .nav-links a.active,.nav-links a:hover{color:var(--primary);}
  .nav-right{display:flex;align-items:center;gap:22px;}
  .helpline{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--slate);}
  .helpline b{display:block;color:var(--ink);font-size:14px;}
  .helpline .icon-pill{width:36px;height:36px;border-radius:50%;background:#eaf5ff;display:flex;align-items:center;justify-content:center;color:var(--primary);font-size:16px;flex:none;}
  .btn-nav{
    background:linear-gradient(135deg,var(--primary),var(--navy));
    color:#fff;padding:12px 24px;border:none;border-radius:40px;font-weight:700;font-size:14px;
    cursor:pointer;white-space:nowrap;transition:.25s;
  }
  .btn-nav:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(2,132,199,.35);}
  .nav-toggle{display:none;}

  /* ===== HERO ===== */
  .hero{
    background:#eef6fc;color:var(--ink);padding:52px 0 0;overflow:hidden;position:relative;
  }
  .hero-photo-layer{position:absolute;inset:0;z-index:0;}
  .hero-photo-layer img{position:absolute;top:0;height:100%;object-fit:cover;}
  .hp-corridor{left:0;width:38%;-webkit-mask-image:linear-gradient(to right, rgba(0,0,0,.55) 0%, rgba(0,0,0,.15) 70%, transparent 100%);mask-image:linear-gradient(to right, rgba(0,0,0,.55) 0%, rgba(0,0,0,.15) 70%, transparent 100%);}
  .hp-pill{left:30%;width:44%;-webkit-mask-image:linear-gradient(to right, transparent 0%, rgba(0,0,0,.85) 22%, rgba(0,0,0,.85) 78%, transparent 100%);mask-image:linear-gradient(to right, transparent 0%, rgba(0,0,0,.85) 22%, rgba(0,0,0,.85) 78%, transparent 100%);}
  .hp-ai{right:0;width:46%;-webkit-mask-image:linear-gradient(to right, transparent 0%, rgba(0,0,0,.9) 24%, rgba(0,0,0,.9) 100%);mask-image:linear-gradient(to right, transparent 0%, rgba(0,0,0,.9) 24%, rgba(0,0,0,.9) 100%);}
  .hero-wash{
    position:absolute;inset:0;z-index:1;
    background:linear-gradient(90deg, rgba(255,255,255,.98) 0%, rgba(255,255,255,.94) 26%, rgba(255,255,255,.55) 45%, rgba(255,255,255,.18) 62%, rgba(255,255,255,0) 78%),
               linear-gradient(180deg, rgba(255,255,255,.15) 0%, rgba(255,255,255,0) 30%, rgba(255,255,255,.1) 75%, rgba(255,255,255,.75) 100%);
  }
  .hero-grid{
    max-width:1220px;margin:0 auto;padding:0 32px;
    display:grid;grid-template-columns:1fr;gap:40px;align-items:center;position:relative;z-index:2;
  }
  .hero-left{max-width:620px;}
  .hero-left .eyebrow{color:var(--primary);letter-spacing:3px;}
  .hero-left .eyebrow::before{background:var(--sky);}
  .hero-left h1{font-size:56px;font-weight:800;line-height:1.08;letter-spacing:-.5px;color:var(--ink);}
  .hero-left p{color:var(--slate);font-size:17px;max-width:490px;margin:22px 0 32px;}
  .hero-buttons{display:flex;gap:16px;margin-bottom:44px;flex-wrap:wrap;align-items:center;}
  .primary-btn{
    background:linear-gradient(135deg,var(--primary),var(--navy));color:#fff;border:none;
    padding:16px 32px;border-radius:40px;font-weight:700;font-size:15.5px;cursor:pointer;transition:.25s;
    box-shadow:0 10px 26px rgba(2,132,199,.3);
  }
  .primary-btn:hover{transform:translateY(-3px);}
  .ghost-btn{
    background:#fff;color:var(--ink);border:none;
    padding:16px 30px;border-radius:40px;font-weight:700;font-size:15.5px;cursor:pointer;transition:.25s;
    display:inline-flex;align-items:center;gap:10px;box-shadow:0 8px 20px rgba(3,37,76,.1);
  }
  .ghost-btn:hover{transform:translateY(-3px);}
  .play-dot{width:26px;height:26px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;}
  .hero-mini-stats{display:flex;gap:34px;flex-wrap:wrap;padding-bottom:60px;}
  .stat-mini{display:flex;align-items:center;gap:12px;}
  .stat-mini .icon-circle{
    width:46px;height:46px;border-radius:50%;background:#fff;border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:19px;color:var(--primary);
    box-shadow:0 6px 14px rgba(3,37,76,.08);flex:none;
  }
  .stat-mini h3{font-size:22px;color:var(--ink);font-weight:800;line-height:1.1;}
  .stat-mini p{font-size:12.5px;color:var(--slate);font-weight:600;}
  .hero-spacer{height:120px;}

  /* clinical panel photo banners */
  .panel-banner{
    width:100%;height:170px;border-radius:16px;background-size:cover;background-position:center;
    margin-bottom:24px;border:1px solid var(--line);position:relative;overflow:hidden;
  }
  .panel-banner::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg, rgba(3,37,76,0) 40%, rgba(3,37,76,.55) 100%);}
  .panel-banner span{
    position:absolute;left:18px;bottom:14px;color:#fff;font-family:'Sora',sans-serif;font-weight:700;font-size:13.5px;z-index:2;
  }

  /* feature bar overlapping hero bottom */
  .feature-bar{
    max-width:1160px;margin:0 auto;transform:translateY(46%);position:relative;z-index:10;
    background:#fff;border-radius:22px;box-shadow:0 30px 70px rgba(3,37,76,.16);
    display:grid;grid-template-columns:repeat(4,1fr);
  }
  .feature-bar .f-item{
    padding:30px 26px;display:flex;gap:16px;align-items:flex-start;
    border-right:1px solid var(--line);
  }
  .feature-bar .f-item:last-child{border-right:none;}
  .f-icon{
    width:46px;height:46px;border-radius:12px;flex:none;
    background:linear-gradient(135deg,var(--primary),var(--sky));
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;
  }
  .f-item h4{font-size:15.5px;margin-bottom:4px;}
  .f-item p{font-size:13px;color:var(--slate);}
  .hero-spacer{height:120px;}

  /* ===== ABOUT ===== */
  .about{padding:150px 0 100px;background:#fff;}
  .about-grid{display:grid;grid-template-columns:.95fr 1.05fr;gap:60px;align-items:center;}
  .about-visual{
    position:relative;border-radius:26px;overflow:hidden;
    min-height:420px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 24px 50px rgba(3,37,76,.14);
  }
  .about-visual img{width:100%;height:420px;object-fit:cover;display:block;}
  .about-visual::before{
    content:"";position:absolute;inset:0;z-index:1;
    background:linear-gradient(180deg, rgba(3,37,76,.05) 40%, rgba(3,37,76,.5) 100%);
  }
  .about-visual .badge-floating{
    position:absolute;background:#fff;border-radius:16px;padding:16px 20px;box-shadow:0 16px 30px rgba(3,37,76,.14);
    display:flex;align-items:center;gap:12px;font-family:'Sora',sans-serif;font-weight:700;color:var(--ink);z-index:2;
  }
  .about-visual .badge1{top:24px;left:24px;font-size:13px;}
  .about-visual .badge2{bottom:24px;right:24px;font-size:13px;}
  .about-copy h2{font-size:36px;font-weight:800;line-height:1.2;margin-bottom:18px;}
  .about-copy p{margin-bottom:16px;font-size:16px;}
  .check-list{margin-top:22px;display:grid;gap:14px;}
  .check-list li{display:flex;gap:12px;align-items:flex-start;font-size:15px;color:var(--ink);font-weight:600;}
  .check-list li span{
    width:24px;height:24px;border-radius:50%;background:#e7f8f0;color:var(--mint);
    display:flex;align-items:center;justify-content:center;font-size:13px;flex:none;
  }

  /* ===== SERVICES ===== */
  .services{padding:100px 0;background:var(--paper);}
  .service-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:26px;}
  .service-card{
    background:#fff;border:1px solid var(--line);border-radius:20px;padding:34px 28px;
    transition:.3s;
  }
  .service-card:hover{transform:translateY(-8px);box-shadow:0 24px 48px rgba(3,37,76,.1);border-color:transparent;}
  .service-card .s-icon{
    width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,var(--navy),var(--primary));
    color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:20px;
  }
  .service-card h3{font-size:19px;margin-bottom:10px;}
  .service-card p{font-size:14.5px;}

  /* ===== DOCTORS ===== */
  .doctors{padding:100px 0;background:#fff;}
  .doctor-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;}
  .doctor-card{
    border:1px solid var(--line);border-radius:20px;overflow:hidden;text-align:center;transition:.3s;
  }
  .doctor-card:hover{box-shadow:0 20px 40px rgba(3,37,76,.1);transform:translateY(-6px);}
  .doctor-photo{
    height:190px;background:linear-gradient(160deg,#dbeeff,#eef7ff);
    display:flex;align-items:center;justify-content:center;font-size:64px;
  }
  .doctor-card h4{font-size:16px;padding:18px 10px 2px;}
  .doctor-card p{font-size:13px;color:var(--primary);font-weight:600;padding-bottom:20px;}

  /* ===== CLINICAL SYSTEM ===== */
  .system-section{padding:100px 0;background:var(--paper);}
  .search-wrapper{
    background:var(--card);padding:26px;border-radius:var(--radius);
    box-shadow:0 10px 30px rgba(15,23,42,.05);border:1px solid rgba(2,132,199,.15);
    max-width:900px;margin:0 auto 44px;
  }
  .search-wrapper label{display:block;font-size:14px;font-weight:700;color:var(--ink);margin-bottom:10px;}
  .search-flex{display:flex;gap:12px;}
  .search-flex input{
    flex:1;padding:16px;border:1px solid var(--line);border-radius:12px;font-size:15px;outline:none;
    background:#f8fafc;transition:.25s;
  }
  .search-flex input:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 4px rgba(2,132,199,.15);}
  .search-flex button{
    background:linear-gradient(135deg,var(--primary),#0369a1);color:#fff;border:none;padding:0 32px;
    border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 4px 14px rgba(2,132,199,.3);transition:.2s;
  }
  .search-flex button:hover{transform:translateY(-1px);}
  #searchResultBox{margin-top:15px;padding:16px;border-radius:12px;display:none;font-size:14px;line-height:1.6;}

  .workspace-layout{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:270px 1fr;gap:28px;}
  .tiles-sidebar{display:flex;flex-direction:column;gap:12px;}
  .tile-item{
    background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;cursor:pointer;
    transition:.25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;
  }
  .tile-item.active{
    border-color:var(--primary);background:linear-gradient(to right,#fff,#f0f9ff);
    box-shadow:0 10px 25px rgba(2,132,199,.08);transform:translateX(5px);
  }
  .tile-step{font-size:11px;font-weight:800;color:#94a3b8;letter-spacing:.5px;margin-bottom:4px;}
  .tile-item.active .tile-step{color:var(--primary);}
  .tile-text{font-weight:700;font-size:15.5px;color:var(--ink);}

  .panel-master-card{
    background:var(--card);border-radius:var(--radius);padding:34px;
    box-shadow:0 20px 40px rgba(15,23,42,.03);border:1px solid var(--line);
  }
  .tab-panel{display:none;}
  .tab-panel.active{display:block;animation:slideIn .35s ease;}
  @keyframes slideIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  .panel-icon-head{
    width:64px;height:64px;border-radius:16px;margin-bottom:22px;
    background:linear-gradient(135deg,var(--navy),var(--primary));color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:28px;
  }
  .panel-main-title{font-size:21px;font-weight:800;color:var(--ink);margin-bottom:24px;border-bottom:2px solid #f1f5f9;padding-bottom:12px;}
  .input-group{margin-bottom:18px;}
  .input-group label{display:block;font-weight:700;font-size:13.5px;margin-bottom:8px;color:var(--slate);}
  input[type="text"],input[type="number"],input[type="date"],input[type="time"],select{
    width:100%;padding:14px;border:1px solid var(--line);border-radius:12px;font-size:15px;
    background:#f8fafc;outline:none;transition:.25s;font-family:'Inter',sans-serif;
  }
  input:focus,select:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 4px rgba(2,132,199,.1);}
  .grid-split{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .table-scroll{overflow-x:auto;margin-top:15px;border-radius:12px;border:1px solid var(--line);}
  .medical-table{width:100%;border-collapse:collapse;background:#fff;}
  .medical-table th{background:#f1f5f9;padding:14px 10px;font-size:11.5px;font-weight:800;color:var(--slate);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--line);}
  .medical-table td{padding:10px;border-bottom:1px solid #e2e8f0;text-align:center;}
  .medical-table td:first-child{font-weight:700;text-align:left;background:#f8fafc;color:var(--ink);font-size:13px;padding-left:16px;width:28%;}
  .medical-table input{border:none;background:transparent;width:100%;text-align:center;font-size:14px;padding:8px 0;outline:none;}
  .medical-table input:focus{background:#e0f2fe;border-radius:6px;}
  .log-sheet-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:20px;}
  .btn-secondary-action{
    background:#f1f5f9;color:#334155;border:1px solid var(--line);padding:12px 20px;border-radius:12px;
    font-weight:700;cursor:pointer;margin-top:15px;font-size:13.5px;display:inline-flex;align-items:center;gap:8px;transition:.2s;
  }
  .btn-secondary-action:hover{background:#e2e8f0;}
  .btn-prime-submit{
    width:100%;padding:18px;background:linear-gradient(135deg,var(--mint),#059669);color:#fff;border:none;
    border-radius:14px;font-size:16.5px;font-weight:700;cursor:pointer;margin-top:30px;
    box-shadow:0 6px 20px rgba(16,185,129,.3);transition:.2s;
  }
  .btn-prime-submit:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(16,185,129,.4);}

  /* ===== APPOINTMENT ===== */
  .appointment{
    display:grid;grid-template-columns:1fr 1fr;gap:60px;padding:100px 0;
    background:linear-gradient(135deg,var(--navy),#0f5ea6);color:#fff;
  }
  .appointment-inner{max-width:1220px;margin:0 auto;padding:0 32px;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;}
  .appointment h5{letter-spacing:2px;margin-bottom:15px;font-size:13px;color:#a9dcff;font-weight:700;text-transform:uppercase;}
  .appointment h2{font-size:38px;margin-bottom:18px;font-weight:800;color:#fff;}
  .appointment p{font-size:16px;line-height:1.8;margin-bottom:30px;color:#dbeefc;}
  .appointment-btn{background:#fff;color:var(--primary);padding:15px 34px;border:none;border-radius:40px;font-size:16px;font-weight:800;cursor:pointer;transition:.25s;}
  .appointment-btn:hover{transform:scale(1.05);}
  .appointment-right form{background:#fff;padding:38px;border-radius:20px;box-shadow:0 24px 50px rgba(0,0,0,.2);}
  .appointment-right input,.appointment-right select{width:100%;padding:15px;margin-bottom:16px;border:1px solid #e2e8f0;border-radius:12px;font-size:15px;color:var(--ink);background:#f8fafc;font-family:'Inter',sans-serif;}
  .appointment-right button{width:100%;padding:16px;background:linear-gradient(135deg,var(--primary),var(--navy));color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:.2s;}
  .appointment-right button:hover{opacity:.92;}

  /* ===== FOOTER ===== */
  footer{background:var(--navy-deep);color:#c7d7ea;padding:70px 0 26px;}
  .footer-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr 1.2fr;gap:44px;margin-bottom:50px;}
  .footer-col h4{color:#fff;font-size:15px;margin-bottom:18px;}
  .footer-col p, .footer-col li{font-size:13.5px;color:#9fb4cc;margin-bottom:10px;}
  .footer-col a{color:#9fb4cc;font-size:13.5px;}
  .footer-col a:hover{color:#7dd3fc;}
  .footer-bottom{border-top:1px solid rgba(255,255,255,.1);padding-top:22px;text-align:center;font-size:12.5px;color:#7c93ad;}

  @media (max-width:980px){
    .nav-links,.helpline{display:none;}
    .hero-grid{grid-template-columns:1fr;text-align:center;}
    .hero-left p{margin-inline:auto;}
    .hero-buttons,.hero-mini-stats{justify-content:center;}
    .hero-photo-layer{opacity:.5;}
    .feature-bar{grid-template-columns:1fr 1fr;}
    .about-grid,.appointment-inner{grid-template-columns:1fr;}
    .service-grid{grid-template-columns:1fr 1fr;}
    .doctor-grid{grid-template-columns:1fr 1fr;}
    .workspace-layout{grid-template-columns:1fr;}
    .footer-grid{grid-template-columns:1fr 1fr;}
  }
  @media (max-width:600px){
    .hero-left h1{font-size:36px;}
    .feature-bar{grid-template-columns:1fr;}
    .service-grid,.doctor-grid,.footer-grid{grid-template-columns:1fr;}
    .grid-split{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<!-- ===== NAVBAR ===== -->
<div class="navwrap">
  <nav class="navbar">
    <div class="logo">
      <div class="logo-mark">✚</div>
      <div class="logo-text"><b>Razaan</b><span>HEALTHCARE SYSTEM</span></div>
    </div>
    <ul class="nav-links">
      <li><a href="#home" class="active">Home</a></li>
      <li><a href="#about">About Us</a></li>
      <li><a href="#services">Services</a></li>
      <li><a href="#doctors">Doctors</a></li>
      <li><a href="#clinical-system">Clinical System</a></li>
      <li><a href="#book-section">Appointments</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
    <div class="nav-right">
      <div class="helpline">
        <div class="icon-pill">📞</div>
        <div>24/7 Helpline<br><b>+252 61 234 5678</b></div>
      </div>
      <button class="btn-nav" onclick="document.getElementById('book-section').scrollIntoView();">Book Appointment</button>
    </div>
  </nav>
</div>

<!-- ===== HERO ===== -->
